services:
  # MongoDB
  mongodb: 
    image: mongo:latest
    container_name: mongodb
    restart: always
    environment: 
      MONGO_INITDB_ROOT_USERNAME: testuser
      MONGO_INITDB_ROOT_PASSWORD: testpassword
      AUTH: admin
    ports:
      - '27017:27017'
    volumes:
      - 'my_mongodb_data:/data/db'
  
  # Mongo Express
  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    restart: always
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: testuser
      ME_CONFIG_MONGODB_ADMINPASSWORD: testpassword
      ME_CONFIG_MONGODB_URL: mongodb://testuser:testpassword@mongodb:27017/?authSource=admin
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: password
    ports:
      - '8081:8081'
    depends_on:
      - mongodb

  # Node App
  node-app:
    build: .
    container_name: focus-tube-backend
    restart: always
    ports:
      - '4000:4000'
    environment:
      PORT: 4000
      MONGO_URL: mongodb://testuser:testpassword@mongodb:27017/focustube?authSource=admin
    depends_on:
      - mongodb

volumes:
  my_mongodb_data:
    driver: local

