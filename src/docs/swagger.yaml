openapi: 3.0.3
info:
  version: 1.0.0
  title: FocusTube Backend API Documentation
  description: >
    Comprehensive enterprise-grade API documentation for FocusTube. 
    This system supports smart YouTube caching, AI-powered learning features (RAG, Summarization), progress tracking, and subscription management.
  contact:
    name: Md.Kamrul Hasan
    url: https://protfolio-eosin-rho.vercel.app/
    email: kamrulhasan20656@gmail.com

servers:
  - url: http://localhost:4000/api/v1
    description: Local Development Server
  - url: https://localhost:4002/api/v1
    description: Production Server (demo)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # --- Reusable Error Schemas ---
    ErrorResponse:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string, example: 'The requested resource could not be found.' }
        errors:
          type: array
          items:
            type: object
            properties:
              field: { type: string, example: 'email' }
              message: { type: string, example: 'Invalid email format' }

    # --- Domain Schemas ---
    User:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        email: { type: string }
        avatar: { type: string }
        role: { type: string, enum: [USER, ADMIN] }
        plan: { type: string, enum: [FREE, PRO] }
        isPro: { type: boolean, example: false }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    AuthTokens:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }

    AuthPayload:
      type: object
      properties:
        user: { $ref: '#/components/schemas/User' }
        tokens: { $ref: '#/components/schemas/AuthTokens' }

    PlaylistThumbnailSet:
      type: object
      properties:
        default: { type: string, example: 'https://i.ytimg.com/vi/abc/default.jpg' }
        medium: { type: string, example: 'https://i.ytimg.com/vi/abc/mqdefault.jpg' }
        high: { type: string, example: 'https://i.ytimg.com/vi/abc/hqdefault.jpg' }
        standard: { type: string, example: 'https://i.ytimg.com/vi/abc/sddefault.jpg' }
        maxres: { type: string, example: 'https://i.ytimg.com/vi/abc/maxresdefault.jpg' }

    PlaylistVideo:
      type: object
      properties:
        youtubeVideoId: { type: string, example: 'dQw4w9WgXcQ' }
        title: { type: string, example: 'Lesson 01: TypeScript Basics' }
        description: { type: string }
        channelId: { type: string, example: 'UC_x5XG1OV2P6uZZ5FSM9Ttw' }
        channelTitle: { type: string, example: 'FocusTube Academy' }
        thumbnails: { $ref: '#/components/schemas/PlaylistThumbnailSet' }
        duration: { type: string, example: 'PT12M8S' }
        durationSeconds: { type: integer, example: 728 }

    Playlist:
      type: object
      properties:
        _id: { type: string, example: '65f1b4f17ddf2ef7d3354d19' }
        youtubePlaylistId: { type: string, example: 'PLxxxxxx' }
        title: { type: string, example: 'Complete Backend Engineering' }
        description: { type: string }
        channelId: { type: string, example: 'UCxxxxxx' }
        channelTitle: { type: string, example: 'FocusTube Academy' }
        thumbnails: { $ref: '#/components/schemas/PlaylistThumbnailSet' }
        sourceType: { type: string, enum: [YOUTUBE], example: YOUTUBE }
        videos:
          type: array
          items: { $ref: '#/components/schemas/PlaylistVideo' }
        fetchedAt: { type: string, format: date-time }
        savedBy:
          type: array
          items: { type: string }
        createdBy: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    PlaylistListItem:
      type: object
      properties:
        id: { type: string, example: '65f1b4f17ddf2ef7d3354d19' }
        youtubePlaylistId: { type: string, example: 'PLxxxxxx' }
        title: { type: string, example: 'Complete Backend Engineering' }
        description: { type: string }
        channelTitle: { type: string, example: 'FocusTube Academy' }
        thumbnails: { $ref: '#/components/schemas/PlaylistThumbnailSet' }
        totalVideos: { type: integer, example: 42 }
        fetchedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    VideoThumbnailSet:
      type: object
      properties:
        default: { type: string, example: 'https://i.ytimg.com/vi/abc/default.jpg' }
        medium: { type: string, example: 'https://i.ytimg.com/vi/abc/mqdefault.jpg' }
        high: { type: string, example: 'https://i.ytimg.com/vi/abc/hqdefault.jpg' }
        standard: { type: string, example: 'https://i.ytimg.com/vi/abc/sddefault.jpg' }
        maxres: { type: string, example: 'https://i.ytimg.com/vi/abc/maxresdefault.jpg' }

    TranscriptChunk:
      type: object
      properties:
        text: { type: string, example: 'In this lesson we start with TypeScript fundamentals.' }
        startTime: { type: number, format: float, example: 12.42 }
        duration: { type: number, format: float, example: 4.13 }

    VideoMetadata:
      type: object
      properties:
        _id: { type: string, example: '67c99f5f8f9bbce6f1e7dd01' }
        youtubeVideoId: { type: string, example: 'dQw4w9WgXcQ' }
        playlistId: { type: string, nullable: true, example: '67c99f5f8f9bbce6f1e7ddaa' }
        title: { type: string, example: 'Lesson 01: TypeScript Basics' }
        description: { type: string, example: 'Introduction to TypeScript.' }
        duration: { type: string, example: 'PT12M8S' }
        thumbnails: { $ref: '#/components/schemas/VideoThumbnailSet' }
        transcript:
          type: array
          items: { $ref: '#/components/schemas/TranscriptChunk' }
        aiSummary: { type: string, example: 'Key Takeaways...' }
        transcriptFetchedAt: { type: string, format: date-time }
        summaryGeneratedAt: { type: string, format: date-time }
        ragChunksGeneratedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    VideoTranscriptData:
      type: object
      properties:
        cacheHit: { type: boolean, example: true }
        transcript:
          type: array
          items: { $ref: '#/components/schemas/TranscriptChunk' }

    VideoSummaryData:
      type: object
      properties:
        cacheHit: { type: boolean, example: false }
        summary: { type: string, example: '1) Key Takeaways...' }

    VideoChatRequest:
      type: object
      required: [question]
      properties:
        question:
          type: string
          minLength: 3
          maxLength: 1000
          example: 'What are the main points about TypeScript generics?'

    VideoChatData:
      type: object
      properties:
        answer:
          type: string
          example: 'The transcript explains generics as reusable type-safe templates...'
        referencedTimestamps:
          type: array
          items: { type: number, format: float }
          example: [120.4, 225.9]

    Note:
      type: object
      properties:
        _id: { type: string, example: '67ca08f798a1e1726a932a41' }
        user_id: { type: string, example: '67ca08f798a1e1726a932a10' }
        video_id: { type: string, example: 'dQw4w9WgXcQ' }
        playlist_id: { type: string, example: '67ca08f798a1e1726a932a12' }
        title: { type: string, example: 'Important Concept' }
        content: { type: string, example: '## Key Idea\nThis explains the architecture...' }
        timestamp_in_seconds: { type: number, example: 125 }
        last_updated: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    NoteCreateRequest:
      type: object
      required: [video_id, playlist_id, title, content, timestamp_in_seconds]
      properties:
        video_id:
          type: string
          pattern: '^[a-zA-Z0-9_-]{6,}$'
          example: 'dQw4w9WgXcQ'
        playlist_id:
          type: string
          pattern: '^[a-f\d]{24}$'
          example: '67ca08f798a1e1726a932a12'
        title:
          type: string
          minLength: 1
          example: 'Important Concept'
        content:
          type: string
          minLength: 1
          example: '## Key Idea\nThis explains the architecture...'
        timestamp_in_seconds:
          type: number
          minimum: 0
          example: 125

    NoteUpdateRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          example: 'Updated Title'
        content:
          type: string
          minLength: 1
          example: 'Updated markdown note content.'
        timestamp_in_seconds:
          type: number
          minimum: 0
          example: 140

    LibraryEnrollmentStatus:
      type: string
      enum: [enrolled, completed, archived]
      example: enrolled

    LibraryEnrollment:
      type: object
      properties:
        _id: { type: string, example: '67ca08f798a1e1726a932a11' }
        user_id: { type: string, example: '67ca08f798a1e1726a932a10' }
        playlist_id: { type: string, example: '67ca08f798a1e1726a932a12' }
        status: { $ref: '#/components/schemas/LibraryEnrollmentStatus' }
        enrolled_at: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    LibraryEnrolledPlaylist:
      type: object
      properties:
        _id: { type: string, example: '67ca08f798a1e1726a932a12' }
        youtubePlaylistId: { type: string, example: 'PLxxxxxx' }
        title: { type: string, example: 'Complete Backend Engineering' }
        description: { type: string }
        channelTitle: { type: string, example: 'FocusTube Academy' }
        thumbnails: { $ref: '#/components/schemas/PlaylistThumbnailSet' }
        videos:
          type: array
          items: { $ref: '#/components/schemas/PlaylistVideo' }

    LibraryEnrollRequest:
      type: object
      required: [playlist_id]
      properties:
        playlist_id:
          type: string
          pattern: '^[a-f\d]{24}$'
          example: '67ca08f798a1e1726a932a12'

    LibraryProgressUpdateRequest:
      type: object
      required: [video_id, playlist_id, watched_second]
      properties:
        video_id:
          type: string
          pattern: '^[a-f\d]{24}$'
          example: '67ca08f798a1e1726a932a13'
        playlist_id:
          type: string
          pattern: '^[a-f\d]{24}$'
          example: '67ca08f798a1e1726a932a12'
        watched_second:
          type: number
          minimum: 0
          example: 510

    LibraryProgress:
      type: object
      properties:
        _id: { type: string, example: '67ca08f798a1e1726a932a14' }
        user_id: { type: string, example: '67ca08f798a1e1726a932a10' }
        video_id: { type: string, example: '67ca08f798a1e1726a932a13' }
        playlist_id: { type: string, example: '67ca08f798a1e1726a932a12' }
        last_watched_second: { type: number, example: 510 }
        is_completed: { type: boolean, example: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    LibraryPlaylistProgressItem:
      type: object
      properties:
        enrollment_id: { type: string, example: '67ca08f798a1e1726a932a11' }
        playlist_id: { type: string, example: '67ca08f798a1e1726a932a12' }
        youtubePlaylistId: { type: string, example: 'PLxxxxxx' }
        title: { type: string, example: 'Complete Backend Engineering' }
        description: { type: string }
        channelTitle: { type: string, example: 'FocusTube Academy' }
        thumbnails: { $ref: '#/components/schemas/PlaylistThumbnailSet' }
        enrollment_status: { $ref: '#/components/schemas/LibraryEnrollmentStatus' }
        enrolled_at: { type: string, format: date-time }
        total_videos: { type: integer, example: 20 }
        completed_videos: { type: integer, example: 9 }
        progress_percentage: { type: number, format: float, example: 45 }

    LibraryContinueWatchingItem:
      type: object
      nullable: true
      properties:
        video_id: { type: string, example: '67ca08f798a1e1726a932a13' }
        playlist_id: { type: string, example: '67ca08f798a1e1726a932a12' }
        last_watched_second: { type: number, example: 510 }
        video_title: { type: string, example: 'Lesson 07: Dependency Injection' }
        thumbnail: { type: string, example: 'https://i.ytimg.com/vi/abc/mqdefault.jpg' }

    BillingPlan:
      type: object
      properties:
        _id: { type: string, example: '67ccf6b58b0dfe7f7730a001' }
        name: { type: string, example: 'FocusTube Pro' }
        price: { type: number, example: 49 }
        interval: { type: string, enum: [month, year], example: year }
        features:
          type: array
          items: { type: string }
          example: ['Unlimited AI summaries', 'Advanced analytics']

    BillingCheckoutRequest:
      type: object
      required: [plan_id]
      properties:
        plan_id:
          type: string
          pattern: '^[a-f\d]{24}$'
          example: '67ccf6b58b0dfe7f7730a001'

    BillingCheckoutData:
      type: object
      properties:
        checkout_url:
          type: string
          format: uri
          example: 'https://checkout.stripe.com/c/pay/cs_test_123'

    BillingHistoryItem:
      type: object
      properties:
        _id: { type: string, example: '67ccfaed8b0dfe7f7730a111' }
        amount: { type: number, example: 49 }
        currency: { type: string, example: USD }
        payment_status: { type: string, enum: [succeeded, failed], example: succeeded }
        created_at: { type: string, format: date-time, example: '2026-03-08T00:00:00.000Z' }

paths:
  # ==========================================
  # 0. SYSTEM MODULE
  # ==========================================
  /health:
    get:
      tags: [System]
      summary: Health check endpoint
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: API is healthy
  # ==========================================
  # 1. AUTH MODULE
  # ==========================================
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name: { type: string, minLength: 2 }
                email: { type: string, format: email }
                password: { type: string, minLength: 8, example: 'StrongPass123' }
      responses:
        201:
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: 'User registered successfully.' }
                  data: { $ref: '#/components/schemas/AuthPayload' }
        400:
          description: Validation Error (Zod)
          content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }
        409:
          description: Conflict - Email already exists

  /auth/login:
    post:
      tags: [Auth]
      summary: Login and get access/refresh tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        200:
          description: Successful login
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: 'Login successful.' }
                  data: { $ref: '#/components/schemas/AuthPayload' }
        401:
          description: Unauthorized - Invalid credentials

  /auth/refresh-token:
    post:
      tags: [Auth]
      summary: Generate a new access token using a refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        200:
          description: New access token generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: 'Token refreshed successfully.' }
                  data: { $ref: '#/components/schemas/AuthTokens' }
        401:
          description: Invalid or expired refresh token

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout user and invalidate tokens
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: Successfully logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: 'Logout successful.' }
                  data:
                    type: object
                    example: {}
        401:
          description: Unauthorized

  # ==========================================
  # 2. USER MODULE
  # ==========================================
  /users/me:
    get:
      tags: [User]
      summary: Get current logged-in user profile
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: User profile details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: 'Profile fetched successfully.' }
                  data: { $ref: '#/components/schemas/User' }
        401:
          description: Unauthorized

    patch:
      tags: [User]
      summary: Update user profile
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                avatar: { type: string, format: uri }
      responses:
        200:
          description: Profile updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: 'Profile updated successfully.' }
                  data: { $ref: '#/components/schemas/User' }
        400:
          description: Validation Error
        401:
          description: Unauthorized
        404:
          description: User not found
    delete:
      tags: [User]
      summary: Deactivate current user profile
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: Profile deactivated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: 'Account deactivated successfully.' }
                  data:
                    type: object
                    example: {}
        401:
          description: Unauthorized
        404:
          description: User not found

  /users/change-password:
    patch:
      tags: [User]
      summary: Change current user password
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword: { type: string, minLength: 8 }
                newPassword: { type: string, minLength: 8, example: 'NewStrongPass123' }
      responses:
        200:
          description: Password changed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: 'Password changed successfully.' }
                  data:
                    type: object
                    example: {}
        400:
          description: Current password invalid or new password policy mismatch
        401:
          description: Unauthorized
        404:
          description: User not found

  # ==========================================
  # 3. PLAYLIST MODULE
  # ==========================================
  /playlists/import:
    post:
      tags: [Playlist]
      summary: Import YouTube playlist (triggers smart caching)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  example: 'https://www.youtube.com/playlist?list=PLxxxxxxxxxxxxxxxx'
      responses:
        201:
          description: Playlist imported from cache or YouTube and saved for the user
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message:
                    {
                      type: string,
                      example: 'Playlist fetched from YouTube and cached successfully.',
                    }
                  data:
                    type: object
                    properties:
                      cacheHit: { type: boolean, example: false }
                      playlist: { $ref: '#/components/schemas/Playlist' }
        400:
          description: Invalid YouTube URL
        401:
          description: Unauthorized
        429:
          description: YouTube API quota exceeded
        404:
          description: Playlist not found or is private

  /playlists:
    get:
      tags: [Playlist]
      summary: Get all saved playlists for the user
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: List of playlists
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: 'Playlists fetched successfully.' }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/PlaylistListItem' }
        401:
          description: Unauthorized

  /playlists/{id}:
    get:
      tags: [Playlist]
      summary: Get detailed view of a specific playlist
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-f\\d]{24}$"
      responses:
        200:
          description: Playlist details with video list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: 'Playlist details fetched successfully.' }
                  data: { $ref: '#/components/schemas/Playlist' }
        401:
          description: Unauthorized
        404:
          description: Playlist not found

  /playlists/{id}/sync:
    post:
      tags: [Playlist]
      summary: Manually sync playlist data from YouTube
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-f\\d]{24}$"
      responses:
        200:
          description: Playlist synced successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: 'Playlist synced successfully.' }
                  data: { $ref: '#/components/schemas/Playlist' }
        401:
          description: Unauthorized
        404:
          description: Playlist not found for this user
        429:
          description: YouTube API quota exceeded

  # ==========================================
  # 4. VIDEO & AI MODULE
  # ==========================================
  /videos/{id}:
    get:
      tags: [Video & AI]
      summary: Get specific video metadata
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: "(^[a-f\\d]{24}$)|(^[a-zA-Z0-9_-]{6,}$)"
      responses:
        200:
          description: Video metadata retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: 'Video metadata fetched successfully.' }
                  data: { $ref: '#/components/schemas/VideoMetadata' }
        400:
          description: Invalid video identifier
          content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }
        401:
          description: Unauthorized
        404:
          description: Video not found
          content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }

  /videos/{id}/transcript:
    get:
      tags: [Video & AI]
      summary: Fetch transcript with MongoDB caching
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: "(^[a-f\\d]{24}$)|(^[a-zA-Z0-9_-]{6,}$)"
      responses:
        200:
          description: Transcript retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: 'Transcript fetched from cache successfully.' }
