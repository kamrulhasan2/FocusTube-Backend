      tags: [Library]
      summary: Enroll current user into a playlist
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LibraryEnrollRequest' }
      responses:
        201:
          description: Playlist enrolled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: 'Playlist enrolled successfully.' }
                  data:
                    type: object
                    properties:
                      enrollment: { $ref: '#/components/schemas/LibraryEnrollment' }
                      playlist: { $ref: '#/components/schemas/LibraryEnrolledPlaylist' }
        400:
          description: Invalid request payload or invalid object id
          content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }
        401:
          description: Unauthorized
          content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }
        404:
          description: Playlist not found
          content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }
