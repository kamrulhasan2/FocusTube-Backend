          description: Unexpected internal error
          content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }

  /library/my-playlists:
    get:
      tags: [Library]
      summary: Get all enrolled playlists with progress summary for current user
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: Library playlists fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: 'Library playlists fetched successfully.' }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/LibraryPlaylistProgressItem' }
        400:
          description: Invalid user id context
          content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }
        401:
          description: Unauthorized
          content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }
        500:
          description: Unexpected internal error
          content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }

  /library/progress:
    patch:
      tags: [Library]
      summary: Update video watching progress
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LibraryProgressUpdateRequest' }
      responses:
        200:
          description: Video progress updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: 'Video progress updated successfully.' }
                  data:
                    type: object
                    properties:
                      progress: { $ref: '#/components/schemas/LibraryProgress' }
                      video:
                        type: object
                        properties:
                          id: { type: string, example: '67ca08f798a1e1726a932a13' }
                          title: { type: string, example: 'Lesson 07: Dependency Injection' }
                          thumbnail:
                            type: string
                            example: 'https://i.ytimg.com/vi/abc/mqdefault.jpg'
                      completion:
                        type: object
                        properties:
                          total_videos: { type: integer, example: 20 }
                          completed_videos: { type: integer, example: 10 }
                          progress_percentage: { type: number, format: float, example: 50 }
        400:
          description: Invalid payload, invalid object ids, archived enrollment, or playlist/video mismatch
          content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }
        401:
          description: Unauthorized
          content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }
        404:
          description: Playlist, video, or enrollment not found
          content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }
        500:
          description: Unexpected internal error or progress persistence failure
          content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }

