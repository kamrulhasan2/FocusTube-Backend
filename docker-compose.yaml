services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: focustube-backend
    restart: unless-stopped
    ports:
      - '${PORT:-4000}:4000'
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4000
      MONGO_URL: ${MONGO_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-120m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      YOUTUBE_API_BASE: ${YOUTUBE_API_BASE:-https://www.googleapis.com/youtube/v3}
      B2_ENDPOINT: ${B2_ENDPOINT}
      B2_ACCESS_KEY: ${B2_ACCESS_KEY}
      B2_SECRET_KEY: ${B2_SECRET_KEY}
      B2_BUCKET_NAME: ${B2_BUCKET_NAME}
      GOOGLE_GEMINI_API_KEY: ${GOOGLE_GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AI_PROVIDER: ${AI_PROVIDER:-GEMINI}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-10}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL}
    networks:
      - focustube-network
    volumes:
      - ./logs:/app/logs

networks:
  focustube-network:
    driver: bridge
